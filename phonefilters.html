<!DOCTYPE html>
<html>
    <head>
        <title>GYMBRAND</title>
        <link rel="stylesheet" href="styles/header.css">
        <link rel="stylesheet" href="styles/phonefilters.css">
        <link rel="icon" href="icons/logoclean.svg">
    </head>
    <body>
        <div class="header">
            <div class="left-section">
                <a href="index.html"><img class="logo-icon js-logo" src="icons/logo.png" ></a>   
            </div>
            <div class="middle-section">
                <p class="header-text js-header-filter-type">
                    HOME
                </p>
                <p class="header-text js-header-filter-type">
                    SHOP
                </p>               
                <a href="policy.html">
                    <p class="header-text js-policy">
                        POLICY
                    </p> 
                </a>                                          
            </div>
            <div class="right-section">
                <a href="newsletter.html"><img class="icon" src="icons/newslettericon.svg"></a>
                <a href="bag.html" >
                    <div class="bag-div" >
                        <img class="icon icon-bag" src="icons/bagicon.svg">
                        <span class="quantity">0</span>
                    </div>
                </a>
            </div>
        </div>
        <div class="filtersort">
            <img class="filtersorticon" src="icons/filterssort.svg">
        </div>
        <div class="main">
            <div class="sortout">
                <div class="filter ">
                    <img class="arrow" src="icons/arrowdown.svg">
                    <p class="filter-text js-sort-text">
                        Sort By: Latest
                    </p> 
                </div>
                <div class="filters">                    
                    <div class="insidefilters">                            
                        <p class="filters-text js-sort-type">
                            Latest
                        </p>
                    </div>    
                    <div class="insidefilters">                            
                        <p class="filters-text js-sort-type">
                            Price
                        </p>
                    </div>                                                                         
                </div> 
            </div>
                        

            <div class="filterout">
                <div class="filter">
                    <img class="arrow" src="icons/arrowdown.svg">
                    <p class="filter-text js-filter-text">
                        Filter: All
                    </p> 
                </div>
                <div class="filters">
                    <div>
                        <div class="insidefilters js-filter-type">
                            <img class="filtersorticon2" src="icons/selectedicon.svg">
                            <p class="filters-text">
                                New Arrivals
                            </p>
                        </div>
                        <div class="insidefilters js-filter-type">
                            <img class="filtersorticon2" src="icons/unselectedicon.svg">
                            <p class="filters-text">
                                Mens
                            </p>
                        </div>                       
                        
                        <div class="insidefilters js-filter-type" >
                            <img class="filtersorticon2" src="icons/unselectedicon.svg">
                            <p class="filters-text">
                                Accessories
                            </p>
                        </div>                         
                    </div>
                    <div class="insidefilters js-availability" style="margin-top: 60px;">
                        <img class="filtersorticon2" src="icons/unselectedicon.svg">
                        <p class="filters-text">
                            Availability
                        </p>
                    </div>
                                                           
                </div>               
            </div> 
            <button class="aply-filters-button js-aply-filters-button">
                APLY
            </button>                              
          
        </div>
        <div class="bottom">            
            <div>
                <a href="index.html"><img class="logo-icon2 js-logo" src="icons/logo.png"></a>
            </div>
            <div class="policy">
                <a href="policy.html">
                    <p class="policytext">
                        Terms and Conditions 
                    </p>
                </a>
                <p class="policytext">
                    Payment and Shipping 
                </p>
                <p class="policytext">
                    Cookie Policy
                </p>
                
            </div>  
            <div class="contact">
                <a href="newsletter.html">
                    <button class="newsletter-button">
                        SUBSCRIBE TO NEWSLETTER                        
                    </button>
                </a> 
                <div>
                    <a href="https://www.instagram.com/erebuzlegacy/" target="_blank" ><img class="iglogo" src="icons/iglogo.svg"></a>
                    <a href="https://www.instagram.com/erebuzlegacy/" target="_blank" ><img class="iglogo" src="icons/tiktokicon.svg"></a>
                </div>     
            </div>          
        </div>        
        <div class="cards" >            
            <p class="ctext">
                ©EREBUZ
            </p>
        </div> 
        <script src="data/header.js"> </script>
        <script type="module" src="scripts/phonefilters.js"> </script>
    </body>
</html>
